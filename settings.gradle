pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
    plugins {
        id 'com.android.application' version '8.8.0' apply false
        id 'com.diffplug.spotless' version '6.25.0' apply false
    }
}
dependencyResolutionManagement {
    repositories {
        google()
        mavenCentral()
        maven { url = "https://api.xposed.info" }
    }
}

rootProject.name = "LineXposed"
include 'app'
